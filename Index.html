// ─── Gold Particle Canvas ─────────────────────────────────────────────────────
function GoldParticles() {
  const canvasRef = useRef(null);
  useEffect(() => {
    const canvas = canvasRef.current;
    if (!canvas) return;
    const ctx = canvas.getContext("2d");
    let animId;
    const resize = () => {
      canvas.width = canvas.offsetWidth;
      canvas.height = canvas.offsetHeight;
    };
    resize();
    window.addEventListener("resize", resize);
    const particles = Array.from({ length: 80 }, () => ({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      r: Math.random() * 2 + 0.3,
      vx: (Math.random() - 0.5) * 0.3,
      vy: -Math.random() * 0.6 - 0.1,
      alpha: Math.random(),
      da: (Math.random() - 0.5) * 0.008,
    }));
    const draw = () => {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      particles.forEach((p) => {
        p.x += p.vx;
        p.y += p.vy;
        p.alpha += p.da;
        if (p.alpha <= 0 || p.alpha >= 1) p.da *= -1;
        if (p.y < 0) { p.y = canvas.height; p.x = Math.random() * canvas.width; }
        if (p.x < 0) p.x = canvas.width;
        if (p.x > canvas.width) p.x = 0;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(212,175,55,${p.alpha * 0.7})`;
        ctx.fill();
      });
      animId = requestAnimationFrame(draw);
    };
    draw();
    return () => { cancelAnimationFrame(animId); window.removeEventListener("resize", resize); };
  }, []);
  return <canvas ref={canvasRef} style={{ position: "absolute", inset: 0, width: "100%", height: "100%", pointerEvents: "none" }} />;
}

// ─── Mouse Glow ───────────────────────────────────────────────────────────────
function MouseGlow() {
  const [pos, setPos] = useState({ x: -500, y: -500 });
  useEffect(() => {
    const h = (e) => setPos({ x: e.clientX, y: e.clientY });
    window.addEventListener("mousemove", h);
    return () => window.removeEventListener("mousemove", h);
  }, []);
  return (
    <div style={{
      position: "fixed", top: 0, left: 0, width: "100vw", height: "100vh",
      pointerEvents: "none", zIndex: 9999, overflow: "hidden",
    }}>
      <div style={{
        position: "absolute",
        left: pos.x - 200, top: pos.y - 200,
        width: 400, height: 400,
        borderRadius: "50%",
        background: "radial-gradient(circle, rgba(212,175,55,0.06) 0%, transparent 70%)",
        transition: "left 0.1s ease, top 0.1s ease",
      }} />
    </div>
  );
}

// ─── Animated Section Reveal (CSS-driven) ─────────────────────────────────────
function Reveal({ children, delay = 0, style = {} }) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) setVisible(true); }, { threshold: 0.12 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, []);
  return (
    <div ref={ref} style={{
      opacity: visible ? 1 : 0,
      transform: visible ? "translateY(0)" : "translateY(40px)",
      transition: `opacity 0.9s ease ${delay}s, transform 0.9s ease ${delay}s`,
      ...style,
    }}>{children}</div>
  );
}

// ─── Scrolling marquee text ───────────────────────────────────────────────────
function Marquee({ text }) {
  const items = Array(8).fill(text);
  return (
    <div style={{ overflow: "hidden", whiteSpace: "nowrap", borderTop: "1px solid #2a2200", borderBottom: "1px solid #2a2200", padding: "14px 0", background: "#050500" }}>

            {t} <span style={{ color: "#b8860b", margin: "0 1.5rem" }}>✦</span>

    </div>
  );
}

// ─── Root App ─────────────────────────────────────────────────────────────────
export default function TrendlineApp() {
  const [activeSection, setActiveSection] = useState("home");

  useEffect(() => {
    const sections = ["home", "collections", "new-arrivals", "modest-fashion", "about", "contact"];
    const obs = new IntersectionObserver((entries) => {
      entries.forEach(e => { if (e.isIntersecting) setActiveSection(e.target.id); });
    }, { threshold: 0.35 });
    sections.forEach(id => { const el = document.getElementById(id); if (el) obs.observe(el); });
    return () => obs.disconnect();
  }, []);

  return (
    <div style={{ background: "#030300", color: "#fff", minHeight: "100vh", overflowX: "hidden" }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Cormorant+Garamond:wght@300;400;500;600;700&display=swap');
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        body { background: #030300; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: #030300; }
        ::-webkit-scrollbar-thumb { background: #D4AF37; border-radius: 2px; }
        @keyframes fadeSlideDown { from { opacity:0; transform:translateY(-20px); } to { opacity:1; transform:translateY(0); } }
        @keyframes fadeSlideUp { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }
        @keyframes bounce { 0%,100%{transform:translateX(-50%) translateY(0);} 50%{transform:translateX(-50%) translateY(8px);} }
        @keyframes marquee { from{transform:translateX(0)} to{transform:translateX(-50%)} }
        @media (max-width: 900px) {
          nav > div:nth-child(2) { display: none !important; }
          nav button.hamburger { display: flex !important; }
          [style*="grid-template-columns: 2fr 1fr 1fr 1fr"] { grid-template-columns: 1fr 1fr !important; }
          [style*="grid-template-columns: 1fr 1fr"] { grid-template-columns: 1fr !important; }
          nav { padding-left: 20px !important; padding-right: 20px !important; }
        }
      `}</style>

      <MouseGlow />
      <NavBar activeSection={activeSection} />
      <HeroSection />
      <Marquee text="New Arrivals — Daily Wear — Modest Fashion — Elegant Dresses — Casual Luxury — Trending Styles" />
      <CollectionsSection />
      <StatsBar />
      <NewArrivalsSection />
      <ModestFashionSection />
      <GallerySection />
      <AboutSection />
      <WACTASection />
      <ContactSection />
      <Marquee text="TRENDLINE Dubai — Women's Fashion — 050 775 3697 — Luxury Ready-Made Garments" />
      <Footer />
      <FloatingWA />
    </div>
  );
}
